<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Escola</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            transition: background-color 0.4s ease, color 0.4s ease;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            background-color: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            transition: background-color 0.4s ease, box-shadow 0.4s ease;
        }
        h2 {
            text-align: center;
            color: #333;
            transition: color 0.4s ease;
        }

        #searchInput {
            width: 300px;
            padding: 12px;
            font-size: 15px;
            border: 2px solid #007BFF;
            border-right: none;
            border-radius: 6px 0 0 6px;
            outline: none;
        }

        #searchInput:focus {
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
        }

        #searchButton {
            padding: 12px 20px;
            font-size: 15px;
            color: #fff;
            background-color: #007BFF;
            border: 2px solid #007BFF;
            border-radius: 0 6px 6px 0;
            cursor: pointer;
            transition: 0.2s;
        }

        #searchButton:hover {
            background-color: #0056b3;
        }

        .search-container {
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        #themeToggle {
            padding: 5px 10px;
            font-size: 14px;
            background: transparent;
            border: 1px solid #007BFF;
            border-radius: 20px;
            color:#007BFF;
            cursor: pointer;
            transition: 0.2s;
        }

        #themeToggle:hover {
            background-color: #007BFF;
            color: #fff;
        }

        .dark-mode {
            background-color: #121212;
            color: #e0e0e0;
        }

        .dark-mode .container {
            background-color: #1e1e1e;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .dark-mode h2 {
            color: #e0e0e0;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
        }

        #resultado {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }
        .card-aluno{ 
            width: 300px;
            padding: 20px;
            padding: 20px;
            border-radius: 8px;
            background-color: #f9f9f9;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }   
    </style>

</head>
<body>
    <div class="container">
        
        <div class="top-bar">
            <button id="themeToggle">
                <i class="fa-solid fa-moon fa-x1"></i>
            </button>
        </div>

        <h2>Bem-vindo ao Sistema Escola</h2>
        
        <h3>Cadastrar Aluno</h3>
        <input type="text" id="nome" placeholder="Nome">
        <input type="text" id="matricula" placeholder="Matrícula">
        <input type="text" id="turma" placeholder="Turma">
        <input type="text" id="turno" placeholder="Turno">
        <input type="number" id="idade" placeholder="Idade">

        <button id="cadastrarBtn">Cadastrar</button>

        <div class="search-container">
            
            <input type="text" id="searchInput" placeholder="Informe a Matrícula do Aluno">
            <button id="searchButton">Buscar</button>
        </div>

        <div style="text-align:center; margin-top:20px;">
            <button id="relatorioBtn">Gerar Relatório</button>

        </div>
        
        <div id="resultado">

        </div>
    
    </div>

    <script>
        
        const themeToggle = document.getElementById("themeToggle");
        const icon = themeToggle.querySelector("i");
        const searchButton = document.getElementById("searchButton");
        const cadastrarBtn = document.getElementById("cadastrarBtn");
        const searchInput = document.getElementById("searchInput");
        const resultado = document.getElementById("resultado");
        let alunoData = JSON.parse(localStorage.getItem("alunos")) || [];

        searchButton.addEventListener("click", buscarAluno);

        function buscarAluno(){
            const matricula = searchInput.value.trim();
            const aluno = alunoData.find(aluno =>
                aluno.matricula === matricula
            );

            if (aluno) {
                resultado.innerHTML = `
                <div class="card-aluno">
                    <h3>${aluno.nome}</h3>
                    <p>Matrícula: ${aluno.matricula}</p>
                    <p>Turma: ${aluno.turma}</p>
                    <p>Turno: ${aluno.turno}</p>
                    <p>Idade: ${aluno.idade}</p>
                </div>
                `;
            }else{
                resultado.innerHTML = `<p style="color: red;">Aluno não encontrado. Verifique a matrícula e tente novamente.</p>`;
            }
        }

        cadastrarBtn.addEventListener("click", cadastrarAluno);

        function cadastrarAluno(){
            const nome = document.getElementById("nome").value.trim();
            const matricula = document.getElementById("matricula").value.trim();
            const turma = document.getElementById("turma").value.trim();
            const turno = document.getElementById("turno").value.trim();
            const idade = parseInt(document.getElementById("idade").value.trim());
            
            if(!nome || !matricula){
                alert("Nome e Matrícula são campos obrigatórios.");
                return;
            }

            const existe = alunoData.find(aluno => aluno.matricula === matricula);
            if(existe){
                alert("Essa matrícula já existe!");
                return;
            }

            if(idade <= 0){
                alert("Idade inválida");
                return;
            }

            const novoAluno = {
                nome: nome,
                matricula: matricula,
                turma: turma,
                turno: turno,
                idade: idade
            };
            alunoData.push(novoAluno);
            localStorage.setItem("alunos", JSON.stringify(alunoData));
        }

        themeToggle.addEventListener("click", () => {
            document.body.classList.toggle("dark-mode");

            if (document.body.classList.contains("dark-mode")) {
                icon.classList.remove("fa-moon");
                icon.classList.add("fa-sun");
            } else {
                icon.classList.remove("fa-sun");
                icon.classList.add("fa-moon");
            }
        });

    </script>
</body>
</html>
